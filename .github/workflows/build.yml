name: Build WAR

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build WAR with Maven
        run: mvn clean package -DskipTests

      - name: Extract version
        run: echo "APP_VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> $env:GITHUB_ENV

      - name: Show WAR location
        run: ls target/*.war

      - name: Stop and remove existing container
        run: docker rm -f demo-app; exit 0

      - name: Build Docker image
        run: docker build -t demo-app .

      - name: Run Docker container
        run: docker run -d --name demo-app -p 8080:8080 demo-app

      - name: Notify Google Chat
        if: always()
        run: |
          $status = "${{ job.status }}"
          $body = @{ text = "Build *$status*: ${{ github.repository }} @ ${{ github.ref_name }} - ${{ github.sha }} | version: ${{ env.APP_VERSION }}" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" -Method Post -Body $body -ContentType "application/json"
