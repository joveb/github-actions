name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build WAR with Maven
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Extract backend version
        run: |
          $version = ([xml](Get-Content backend/pom.xml)).project.version
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload WAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-war
          path: backend/target/demo-0.0.1-SNAPSHOT.war

      - name: Notify Google Chat
        if: always()
        run: |
          $status = "${{ job.status }}"
          $body = @{ text = "Backend build *$status*: ${{ github.repository }} @ ${{ github.ref_name }} - ${{ github.sha }} | version: ${{ env.APP_VERSION }}" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" -Method Post -Body $body -ContentType "application/json"

  build-frontend:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build React app
        working-directory: frontend
        run: npm run build

      - name: Extract frontend version
        run: |
          $version = (Get-Content frontend/package.json | ConvertFrom-Json).version
          echo "FRONTEND_VERSION=$version" >> $env:GITHUB_ENV

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Notify Google Chat
        if: always()
        run: |
          $status = "${{ job.status }}"
          $body = @{ text = "Frontend build *$status*: ${{ github.repository }} @ ${{ github.ref_name }} - ${{ github.sha }} | version: ${{ env.FRONTEND_VERSION }}" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" -Method Post -Body $body -ContentType "application/json"

  deploy:
    runs-on: self-hosted
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-war
          path: backend/target/

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

      - name: Extract versions
        run: |
          $backendVersion = ([xml](Get-Content backend/pom.xml)).project.version
          $frontendVersion = (Get-Content frontend/package.json | ConvertFrom-Json).version
          echo "APP_VERSION=$backendVersion" >> $env:GITHUB_ENV
          echo "FRONTEND_VERSION=$frontendVersion" >> $env:GITHUB_ENV

      - name: Stop and remove existing containers
        run: docker rm -f demo-app demo-frontend; exit 0

      - name: Build backend Docker image
        run: docker build -t demo-app backend/

      - name: Run backend Docker container
        run: docker run -d --name demo-app -p 8080:8080 demo-app

      - name: Build frontend Docker image
        run: docker build -t demo-frontend frontend/

      - name: Run frontend Docker container
        run: docker run -d --name demo-frontend -p 3000:80 demo-frontend

      - name: Notify Google Chat
        if: always()
        run: |
          $status = "${{ job.status }}"
          $body = @{ text = "Deploy *$status*: ${{ github.repository }} @ ${{ github.ref_name }} - ${{ github.sha }} | backend: ${{ env.APP_VERSION }} | frontend: ${{ env.FRONTEND_VERSION }}" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" -Method Post -Body $body -ContentType "application/json"
