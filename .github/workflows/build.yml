name: CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-backend:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build WAR with Maven
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Extract backend version
        run: |
          $version = ([xml](Get-Content backend/pom.xml)).project.version
          echo "APP_VERSION=$version" >> $env:GITHUB_ENV

      - name: Notify Google Chat
        if: always()
        run: |
          $status = "${{ job.status }}"
          $body = @{ text = "Backend build *$status*: ${{ github.repository }} @ ${{ github.ref_name }} - ${{ github.sha }} | version: ${{ env.APP_VERSION }}" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" -Method Post -Body $body -ContentType "application/json"

  build-frontend:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build React app
        working-directory: frontend
        run: npm run build

      - name: Extract frontend version
        run: |
          $version = (Get-Content frontend/package.json | ConvertFrom-Json).version
          echo "FRONTEND_VERSION=$version" >> $env:GITHUB_ENV

      - name: Notify Google Chat
        if: always()
        run: |
          $status = "${{ job.status }}"
          $body = @{ text = "Frontend build *$status*: ${{ github.repository }} @ ${{ github.ref_name }} - ${{ github.sha }} | version: ${{ env.FRONTEND_VERSION }}" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" -Method Post -Body $body -ContentType "application/json"

  deploy:
    runs-on: self-hosted
    needs: [build-backend, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Extract versions
        run: |
          $backendVersion = ([xml](Get-Content backend/pom.xml)).project.version
          $frontendVersion = (Get-Content frontend/package.json | ConvertFrom-Json).version
          echo "APP_VERSION=$backendVersion" >> $env:GITHUB_ENV
          echo "FRONTEND_VERSION=$frontendVersion" >> $env:GITHUB_ENV

      - name: Stop and remove existing containers
        run: docker rm -f demo-app demo-frontend; exit 0

      - name: Build backend Docker image
        run: docker build -t demo-app backend/

      - name: Run backend Docker container
        run: docker run -d --name demo-app -p 8080:8080 demo-app

      - name: Build frontend Docker image
        run: docker build -t demo-frontend frontend/

      - name: Run frontend Docker container
        run: docker run -d --name demo-frontend -p 3000:80 demo-frontend

      - name: Notify Google Chat
        if: always()
        run: |
          $status = "${{ job.status }}"
          $body = @{ text = "Deploy *$status*: ${{ github.repository }} @ ${{ github.ref_name }} - ${{ github.sha }} | backend: ${{ env.APP_VERSION }} | frontend: ${{ env.FRONTEND_VERSION }}" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" -Method Post -Body $body -ContentType "application/json"

  e2e-tests:
    runs-on: self-hosted
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        id: e2e
        working-directory: frontend
        run: npx playwright test --config=playwright.config.js --reporter=json > playwright-report.json; exit 0

      - name: Parse test results
        id: results
        run: |
          $report = Get-Content frontend/playwright-report.json | ConvertFrom-Json
          $passed = $report.stats.expected
          $failed = $report.stats.unexpected
          $total = $passed + $failed
          $duration = [math]::Round($report.stats.duration / 1000, 1)
          echo "PASSED=$passed" >> $env:GITHUB_ENV
          echo "FAILED=$failed" >> $env:GITHUB_ENV
          echo "TOTAL=$total" >> $env:GITHUB_ENV
          echo "DURATION=$duration" >> $env:GITHUB_ENV

      - name: Notify Google Chat
        if: always()
        run: |
          $status = "${{ job.status }}"
          $body = @{ text = "E2E Tests *$status*: ${{ github.repository }} @ ${{ github.ref_name }} | passed: ${{ env.PASSED }} | failed: ${{ env.FAILED }} | total: ${{ env.TOTAL }} | duration: ${{ env.DURATION }}s" } | ConvertTo-Json
          Invoke-RestMethod -Uri "${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}" -Method Post -Body $body -ContentType "application/json"
